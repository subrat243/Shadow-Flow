# ============================================================
# Shadow-Flow  — Master Configuration File
# ============================================================

general:
  project_name: "Shadow-Flow"
  version: "1.0.0"
  output_dir: "reports"
  log_dir: "logs"
  log_level: "INFO"          # DEBUG | INFO | WARNING | ERROR

# ─── Tool Paths ───────────────────────────────────────────
tools:
  nmap: "nmap"
  nikto: "nikto"
  tcpdump: "tcpdump"
  bettercap: "bettercap"
  metasploit:
    host: "127.0.0.1"
    port: 55553
    user: "msf"
    password: "msf"

# ─── Recon Settings ───────────────────────────────────────
recon:
  nmap:
    timing: "T4"             # T0–T5 (T4 = aggressive but safe)
    flags: ["-sV", "-O"]     # service version + OS detection
  dns:
    nameservers: ["8.8.8.8", "1.1.1.1"]
    record_types: ["A", "AAAA", "MX", "NS", "TXT", "CNAME", "SOA"]
  subdomain:
    wordlist: "config/wordlists/subdomains.txt"
    threads: 50
    passive: true            # also query crt.sh for passive enum

# ─── Scanning Settings ────────────────────────────────────
scanning:
  nse_scripts:
    - "vuln"
    - "auth"
    - "default"
    - "http-headers"
  nikto:
    extra_flags: []

# ─── Exploitation Settings ────────────────────────────────
exploitation:
  enabled: false             # Set true only in authorized lab environments
  auto_select: true          # Auto-pick best exploit per service
  default_payload: "generic/shell_reverse_tcp"

# ─── Persistence ──────────────────────────────────────────
persistence:
  simulation_only: true      # ALWAYS true for safety

# ─── Network Monitor ──────────────────────────────────────
network_monitor:
  interface: "eth0"
  capture_duration: 30       # seconds
  bettercap_enabled: false

# ─── Reporting ────────────────────────────────────────────
reporting:
  json: true
  html: true
  include_raw_output: false
